        async function fetchTitle(url) {
            try {
                const response = await fetch(url, { mode: 'no-cors' }); // `no-cors` limits headers
                const text = await response.text();

                // Parse the response to get the title
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');
                return doc.querySelector('title').textContent || "No Title Found";
            } catch (error) {
                console.error(`Error fetching title for ${url}:`, error);
                return "Visit Link"; // Fallback text
            }
        }

        async function createLinks() {
            const container = document.getElementById('links-container');
            container.innerHTML = ""; // Clear loading text

            for (const url of urls) {
                const title = await fetchTitle(url); // Fetch title
                const link = document.createElement('a'); // Create hyperlink element
                link.href = url;
                link.target = "_blank"; // Open in a new tab
                link.textContent = title; // Set link text to the fetched title
                container.appendChild(link); // Add link to the container
                container.appendChild(document.createElement('br')); // Add line break
            }
        }

        // Call the function to process all URLs
        createLinks();
    </script>
